<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NammudeShop | Premium Kitchen Essentials</title>
    <meta name="description" content="Kerala's own shop for premium quality kitchen products, starting with our stylish 3 in 1 Soap Pump Dispenser.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

<header class="navbar">
    <div class="logo">Nammude<span>Shop</span></div>
    <nav>
        <a href="#home">Home</a>
        <a href="#product">Product</a>
        <a href="#pricing">Combos</a>
        <a href="#contact">Contact Us</a>
    </nav>
</header>

<section id="home" class="hero" style="background-image: url('assets/nammude_hero_bg_1775285581914.png');">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1>കേരളത്തിന്റെ സ്വന്തം ഷോപ്പ്</h1>
        <p>Premium kitchen essentials for every home</p>
        <div class="hero-actions">
            <a href="#pricing" class="btn btn-primary">Shop Now</a>
        </div>
    </div>
</section>

<section class="review-cta">
    <div class="container">
        <div class="glass-panel review-card">
            <h3>Love your NammudeShop purchase?</h3>
            <p>Your feedback keeps us improving.</p>

            <!-- FIXED BUTTON -->
            <button class="btn btn-primary review-btn" onclick="toggleReviews()" type="button">
                See Reviews
            </button>

            <!-- REVIEWS CONTAINER -->
            <div id="reviewsContainer"></div>

        </div>
    </div>
</section>

<footer>
    <p>© 2026 NammudeShop</p>
</footer>

<!-- REVIEW SCRIPT -->
<script>
const reviews = [
  { name: "Rahul K.", rating: 5, review: "സാധനം കൊള്ളാം 💯" },
  { name: "Anita S.", rating: 4, review: "item കൊള്ളാം" },
  { name: "Faisal M.", rating: 4, review: "adipoli 🔥" }
];

function getStars(rating) {
  let stars = "";
  for (let i = 0; i < 5; i++) {
    stars += i < rating ? "★" : "☆";
  }
  return stars;
}

function toggleReviews() {
  const container = document.getElementById("reviewsContainer");

  if (container.style.display === "block") {
    container.style.display = "none";
    return;
  }

  container.style.display = "block";
  container.innerHTML = "";

  reviews.forEach((r) => {
    container.innerHTML += `
      <div style="border:1px solid #ddd; padding:12px; margin:10px 0; border-radius:8px;">
        <strong>${r.name}</strong> ✅ Verified Purchase<br>
        <span style="color:gold;">${getStars(r.rating)}</span>
        <p>${r.review}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
